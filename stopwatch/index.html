<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <div class="container">
        <div class="display">00:00:00</div>
        <div class="buttons">
        <button class="btn1" id="stopbtn" onclick="Stopbtn()">Pause</button>
        <button class="btn2" id="startbtn" onclick="Startbtn()">Start</button>
        <button class="btn3" id="resetbtn" onclick="Resetbtn()">Reset</button>
        </div>
    </div>
</body>
</html>
