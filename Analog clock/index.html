<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analog Clock</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <div class="outer">
        <div class="center">
            <div class="min"></div>
            <div class="hrs"></div>
            <div class="sec"></div>
        </div>
            <div id="t">12</div>
            <div id="el">11</div>
            <div id="o">1</div>
            <div id="tw">2</div>
            <div id="th">3</div>
            <div id="fo">4</div>
            <div id="fi">5</div>
            <div id="si">6</div>
            <div id="se">7</div>
            <div id="ei">8</div>
            <div id="ni">9</div>
            <div id="te">10</div>
    </div>
</body>
</html>
